<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Bloom Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sparkles"></div>
  <div class="floating-petals"></div>

  <header class="hero small-hero">
    <div class="hero-inner">
      <p class="hero-badge">Your Saved Spiritual Space</p>
      <h1>New Bloom Dashboard</h1>
      <p class="hero-text">Come back to your saved readings and reflections anytime.</p>
      <div class="hero-actions">
        <a href="index.html" class="btn gold">Back Home</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Your Account</h2>
      <p id="dashboardUserStatus">Checking login...</p>
    </section>

    <section class="card">
      <h2>Saved Readings</h2>
      <div id="savedReadingsList" class="saved-list">
        <p>No saved readings yet.</p>
      </div>
    </section>
  </main>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      query,
      where,
      getDocs,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const dashboardUserStatus = document.getElementById("dashboardUserStatus");
    const savedReadingsList = document.getElementById("savedReadingsList");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        dashboardUserStatus.textContent = "You are not logged in.";
        savedReadingsList.innerHTML = "<p>Please log in first from the home page.</p>";
        return;
      }

      dashboardUserStatus.textContent = `Logged in as ${user.email}`;

      try {
        const readingsRef = collection(db, "readings");
        const q = query(
          readingsRef,
          where("userId", "==", user.uid),
          orderBy("createdAt", "desc")
        );

        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          savedReadingsList.innerHTML = "<p>No saved readings yet.</p>";
          return;
        }

        savedReadingsList.innerHTML = "";

        snapshot.forEach((doc) => {
          const data = doc.data();

          const item = document.createElement("div");
          item.className = "saved-item";
          item.innerHTML = `
            <h3>${data.name || "Saved Reading"}</h3>
            <p><strong>Life Path:</strong> ${data.lifePath || "—"}</p>
            <p><strong>Personal Year:</strong> ${data.personalYear || "—"}</p>
            <p><strong>Chinese Zodiac:</strong> ${data.zodiacAnimal || "—"}</p>
            <p><strong>Energy Theme:</strong> ${data.energyTheme || "—"}</p>
            <div class="saved-section">
              <strong>Full Report:</strong>
              <p>${data.fullReportText || ""}</p>
            </div>
            <small>
              ${
                data.createdAt?.toDate
                  ? data.createdAt.toDate().toLocaleString()
                  : ""
              }
            </small>
          `;

          savedReadingsList.appendChild(item);
        });
      } catch (error) {
        console.error(error);
        savedReadingsList.innerHTML = "<p>There was a problem loading your saved readings.</p>";
      }
    });
  </script>
</body>
</html>
